name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # deploy on every push to main
  workflow_dispatch: # allow manual trigger from the Actions tab

# Allow the workflow to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel in-progress if a newer push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # The repo name is injected so vite.config.ts picks it up automatically.
        # If your repo is NOT named "abyss-tools", change this value.
        env:
          VITE_BASE_PATH: /abyss-tools/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
